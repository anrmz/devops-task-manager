version: '3.9'

services:
  # ─────────────────────────────────────────
  # MongoDB Database
  # ─────────────────────────────────────────
  mongodb:
    image: mongo:7.0
    container_name: taskmanager-mongodb
    restart: unless-stopped
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db
    networks:
      - taskmanager-net
    healthcheck:
      test: [ 'CMD', 'mongosh', '--eval', "db.adminCommand('ping')" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

  # ─────────────────────────────────────────
  # Backend API (Node.js + Express)
  # ─────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    container_name: taskmanager-backend
    restart: unless-stopped
    ports:
      - '5000:5000'
    environment:
      PORT: 5000
      MONGO_URI: mongodb://mongodb:27017/taskmanager
      NODE_ENV: production
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - taskmanager-net
    healthcheck:
      test: [ 'CMD', 'wget', '--no-verbose', '--tries=1', '--spider', 'http://localhost:5000/health' ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  # ─────────────────────────────────────────
  # Frontend (React + Nginx)
  # ─────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
      args:
        REACT_APP_API_URL: http://localhost:5000
    container_name: taskmanager-frontend
    restart: unless-stopped
    ports:
      - '3000:3000'
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - taskmanager-net
    healthcheck:
      test: [ 'CMD', 'wget', '--no-verbose', '--tries=1', '--spider', 'http://localhost:3000' ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

# ─────────────────────────────────────────
# Persistent Volumes
# ─────────────────────────────────────────
volumes:
  mongo_data:
    driver: local

# ─────────────────────────────────────────
# Internal Network
# ─────────────────────────────────────────
networks:
  taskmanager-net:
    driver: bridge
